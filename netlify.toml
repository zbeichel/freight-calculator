[build]
  publish = "."
  command = ""

[build.environment]
  NODE_VERSION = "18"

[functions]
  directory = "netlify/functions"

# Redirect www to non-www (301 permanent — Google will update its index)
[[redirects]]
  from = "https://www.quickfreightcalc.com/*"
  to = "https://quickfreightcalc.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.quickfreightcalc.com/*"
  to = "https://quickfreightcalc.com/:splat"
  status = 301
  force = true

# Ensure rates.json is served with correct content type and no caching
[[headers]]
  for = "/rates.json"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "no-cache, no-store, must-revalidate"

# Never cache HTML pages — always serve fresh
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# Never cache the root
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
